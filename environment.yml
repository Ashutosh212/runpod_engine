name: ai4rs_infer
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - torch==2.4.0
    - torchvision==0.19.0
    - --index-url https://download.pytorch.org/whl/cu124
    - mmengine==0.10.7
    - mmcv==2.2.0
    - mmdet==3.3.0
    - mmrotate==1.0.0rc1
    - fastapi==0.111.0
    - uvicorn[standard]==0.30.1
    - python-multipart==0.0.9
    - numpy
    - opencv-python-headless
    - pydantic
