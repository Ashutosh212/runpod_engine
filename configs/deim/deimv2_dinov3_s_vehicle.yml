# Fine-tuning config: DEIMv2-S (DINOv3/ViT-Tiny backbone) on aerial vehicle data
# Classes: vehicle (id=1), smallvehicle (id=2)  →  num_classes=2
# Start from: ckpts/deimv2_dinov3_s_coco.pth   (use -t flag, not -r)
# Single GPU:  torchrun --nproc_per_node=1 train.py -c this_file --use-amp -t ckpts/deimv2_dinov3_s_coco.pth

__include__: [
  '../dataset/custom_detection.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deimv2.yml',
]

output_dir: ./outputs/deimv2_dinov3_s_vehicle

# --- Dataset ---
num_classes: 2
remap_mscoco_category: False

# --- Backbone ---
DEIM:
  backbone: DINOv3STAs

DINOv3STAs:
  name: vit_tiny
  embed_dim: 192
  weights_path: ./ckpts/vitt_distill.pt
  interaction_indexes: [3, 7, 11]
  num_heads: 3

# --- Encoder / Decoder (same as DEIMv2-S) ---
HybridEncoder:
  in_channels: [192, 192, 192]
  depth_mult: 0.67
  expansion: 0.34
  hidden_dim: 192
  dim_feedforward: 512

DEIMTransformer:
  feat_channels: [192, 192, 192]
  hidden_dim: 192
  dim_feedforward: 512
  num_layers: 4
  eval_idx: -1

# --- Optimizer: lower LR for fine-tuning ---
# Backbone (ViT-Tiny) gets 5× lower LR — features are already strong
optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*.dinov3)(?!.*(?:norm|bn|bias)).*$'
      lr: 0.000005        # 5× lower than default 0.000025
    -
      params: '^(?=.*.dinov3)(?=.*(?:norm|bn|bias)).*$'
      lr: 0.000005
      weight_decay: 0.
    -
      params: '^(?=.*(?:sta|encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.
  lr: 0.0001              # head/neck LR: 5× lower than default 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.0001

# --- Schedule: shorter for fine-tuning (72 epochs total) ---
epoches: 72
flat_epoch: 40            # 4 + 72//2 ≈ 40
no_aug_epoch: 8

# --- LR warmup ---
lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 250    # shorter warmup for fine-tuning

# --- EMA ---
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 500

# --- Data augmentation (same mosaic/mixup pipeline, tuned to 72 epochs) ---
train_dataloader:
  total_batch_size: 16    # single GPU — safe for L40S at 640×640
  dataset:
    img_folder: /sfs/data/custom/trainval/images
    ann_file: /sfs/DEIMv2/data/vehicle/annotations/instances_train.json
    transforms:
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1],
           scaling_range: [0.5, 1.5], probability: 1.0, fill_value: 0, use_cache: True,
           max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 40, 64]    # [start, flat_epoch, epoches - no_aug_epoch]
  collate_fn:
    base_size: 640
    mixup_prob: 0.5
    ema_restart_decay: 0.9999
    base_size_repeat: 10
    mixup_epochs: [4, 40]
    stop_epoch: 64            # epoches - no_aug_epoch
    copyblend_epochs: [4, 64]

val_dataloader:
  total_batch_size: 8
  dataset:
    img_folder: /sfs/data/custom/trainval/images
    ann_file: /sfs/DEIMv2/data/vehicle/annotations/instances_val.json
    transforms:
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}

# --- Loss (unchanged from DEIMv2-S) ---
DEIMCriterion:
  matcher:
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 60   # ~90% of (epoches - no_aug_epoch) = ~58
